<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A vs K — Edit Compare</title>
<style>
:root {
  --bg:#0a0a0b; --surface:#111113; --surface2:#18181b; --border:#26262a;
  --text:#e8e6e0; --text-muted:#4a4a52; --text-dim:#7a7a84;
  --kamel:#f0d98c; --autohdr:#7eb8e8;
  --menu-h:64px; --radius:10px;
}
.light {
  --bg:#f0ede8; --surface:#faf9f7; --surface2:#e8e4de; --border:#d0ccc6;
  --text:#18181a; --text-muted:#9a9a9f; --text-dim:#6a6a6f;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Georgia',serif;min-height:100vh;transition:background .3s,color .3s;}
.menu{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--menu-h);display:flex;align-items:center;padding:0 24px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);background:rgba(10,10,11,0.88);border-bottom:1px solid var(--border);gap:12px;}
.light .menu{background:rgba(240,237,232,0.9);}
.menu-brand{font-style:italic;font-size:.95rem;color:var(--text-dim);white-space:nowrap;flex-shrink:0;}
@media(max-width:700px){
  .menu{top:auto;bottom:0;border-top:1px solid var(--border);border-bottom:none;padding:0 10px;gap:8px;}
  .main{padding-top:20px!important;padding-bottom:calc(var(--menu-h)+20px)!important;}
  .menu-brand{display:none;}
}
.prop-wrap{position:relative;flex:1;min-width:0;max-width:260px;}
.prop-btn{display:flex;align-items:center;gap:8px;width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:50px;padding:7px 14px;font-family:'Courier New',monospace;font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text);cursor:pointer;transition:border-color .2s;}
.prop-btn:hover{border-color:var(--text-dim);}
.prop-btn-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;text-align:left;}
.pb-chev{font-size:.5rem;color:var(--text-muted);flex-shrink:0;transition:transform .25s;}
.prop-btn.open .pb-chev{transform:rotate(180deg);}
.prop-dd{display:none;position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;z-index:300;box-shadow:0 12px 40px rgba(0,0,0,.5);max-height:70vh;overflow-y:auto;min-width:220px;}
@media(max-width:700px){.prop-dd{top:auto;bottom:calc(100% + 8px);}}
.prop-dd.open{display:block;}
.pd-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.pd-item:last-child{border-bottom:none;}
.pd-item:hover,.pd-item.active{background:var(--surface2);}
.pd-label{font-family:'Courier New',monospace;font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text);white-space:nowrap;}
.pd-item.active .pd-label{color:var(--autohdr);}
.pd-count{font-family:'Courier New',monospace;font-size:.58rem;color:var(--text-muted);flex-shrink:0;}
.editor-tabs{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:50px;padding:3px;gap:2px;flex-shrink:0;}
.tab{padding:6px 16px;border-radius:50px;font-family:'Courier New',monospace;font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;color:var(--text-muted);border:none;background:transparent;transition:all .22s;white-space:nowrap;}
.tab:hover{color:var(--text);}
.tab.active-autohdr{background:var(--autohdr);color:#0a1520;}
.tab.active-kamel{background:var(--kamel);color:#1a1500;}
.nav-group{display:flex;gap:5px;flex-shrink:0;}
.nav-btn{background:var(--surface2);border:1px solid var(--border);border-radius:50px;padding:6px 14px;color:var(--text-dim);font-family:'Courier New',monospace;font-size:.65rem;cursor:pointer;transition:all .2s;white-space:nowrap;}
.nav-btn:hover{border-color:var(--text-dim);color:var(--text);}
.theme-btn{background:transparent;border:1px solid var(--border);border-radius:50%;width:32px;height:32px;color:var(--text-dim);font-size:.85rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:auto;}
.theme-btn:hover{border-color:var(--text-dim);}
.main{padding-top:calc(var(--menu-h)+24px);padding-bottom:60px;max-width:1600px;margin:0 auto;padding-left:18px;padding-right:18px;}
.stats-wrap{margin-bottom:20px;}
.stats-bar{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 18px;cursor:pointer;user-select:none;}
.stats-bar.open{border-radius:var(--radius) var(--radius) 0 0;}
.sb-left{display:flex;align-items:center;gap:14px;}
.sb-title{font-family:'Courier New',monospace;font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);}
.sb-pills{display:flex;gap:6px;}
.sp{font-family:'Courier New',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:50px;}
.sp.k{background:rgba(240,217,140,.12);color:var(--kamel);border:1px solid rgba(240,217,140,.2);}
.sp.a{background:rgba(126,184,232,.12);color:var(--autohdr);border:1px solid rgba(126,184,232,.2);}
.chev{font-size:.6rem;color:var(--text-muted);transition:transform .3s;}
.chev.open{transform:rotate(180deg);}
.stats-body{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.4,0,.2,1);background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);}
.stats-body.open{max-height:400px;}
.stats-inner{padding:18px;}
.billing-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
.vol-wrap{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.vol-btn{background:none;border:none;color:var(--text-dim);font-size:1rem;padding:7px 12px;cursor:pointer;}
.vol-btn:hover{color:var(--text);}
.vol-input{background:none;border:none;border-left:1px solid var(--border);border-right:1px solid var(--border);color:var(--text);font-family:'Courier New',monospace;font-size:.8rem;font-weight:700;width:78px;text-align:center;padding:7px 4px;outline:none;}
.vol-label{font-family:'Courier New',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);}
.btabs{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:50px;padding:3px;gap:2px;margin-left:auto;}
.btab{padding:5px 12px;border-radius:50px;font-family:'Courier New',monospace;font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;color:var(--text-muted);border:none;background:transparent;transition:all .22s;}
.btab.active{background:var(--surface);color:var(--text);border:1px solid var(--border);}
.money-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
@media(max-width:900px){.money-row{grid-template-columns:1fr 1fr;}}
.mc{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;}
.mc-label{font-family:'Courier New',monospace;font-size:.57rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;}
.mbars{display:flex;flex-direction:column;gap:7px;}
.mbar-row{display:flex;align-items:center;gap:8px;}
.mb-name{font-family:'Courier New',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;width:56px;flex-shrink:0;}
.mb-name.k{color:var(--kamel);} .mb-name.a{color:var(--autohdr);}
.mb-track{flex:1;height:4px;background:var(--border);border-radius:3px;overflow:hidden;}
.mb-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.mb-fill.k{background:var(--kamel);} .mb-fill.a{background:var(--autohdr);}
.mb-val{font-family:'Courier New',monospace;font-size:.63rem;color:var(--text-dim);min-width:50px;text-align:right;}
.grid-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.grid-info{font-family:'Courier New',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);}
.image-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;}
@media(max-width:580px){.image-grid{grid-template-columns:1fr;}}
.img-card{position:relative;overflow:hidden;aspect-ratio:3/2;background:var(--surface2);border:1px solid var(--border);cursor:pointer;scroll-margin-top:calc(var(--menu-h) + 12px);}
.img-stack{position:absolute;inset:0;}
.img-stack img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;}
#imgGrid.show-autohdr .img-stack img.a{opacity:1;}
#imgGrid.show-kamel   .img-stack img.k{opacity:1;}
#imgGrid.show-autohdr .img-card{border-color:rgba(126,184,232,.35);}
#imgGrid.show-kamel   .img-card{border-color:rgba(240,217,140,.35);}
.img-badge{position:absolute;bottom:8px;left:8px;padding:3px 9px;border-radius:50px;font-family:'Courier New',monospace;font-size:.55rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;backdrop-filter:blur(10px);z-index:5;display:none;}
.img-badge.a{background:rgba(126,184,232,.15);color:var(--autohdr);border:1px solid rgba(126,184,232,.2);}
.img-badge.k{background:rgba(240,217,140,.15);color:var(--kamel);border:1px solid rgba(240,217,140,.2);}
#imgGrid.show-autohdr .img-badge.a{display:block;}
#imgGrid.show-kamel   .img-badge.k{display:block;}
.img-num{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);color:var(--text-dim);font-family:'Courier New',monospace;font-size:.53rem;letter-spacing:.1em;padding:2px 7px;border-radius:50px;z-index:5;}
.focused-card{outline:2px solid var(--autohdr);outline-offset:-2px;}
#imgGrid.show-kamel .focused-card{outline-color:var(--kamel);}
.dots{display:flex;gap:5px;justify-content:center;margin-top:14px;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--border);cursor:pointer;transition:all .2s;}
.dot.on{background:var(--text-dim);transform:scale(1.4);}
</style>
</head>

const K="Editors_web/", A="AUTOHDR_web/";
let curProp=0, curEd="autohdr", billing="monthly";
let focusedCard=0; // tracks which card row is keyboard-focused
const RATE={monthly:{k:0.75,a:0.45},annually:{k:0.75,a:0.41}};

function buildDD(){
  const dd=document.getElementById("propDD"); dd.innerHTML="";
  PROPERTIES.forEach((p,i)=>{
    const el=document.createElement("div");
    el.className="pd-item"+(i===curProp?" active":""); el.dataset.i=i;
    el.innerHTML=`<span class="pd-label">${p.label}</span><span class="pd-count">${p.count} pairs</span>`;
    el.onclick=()=>selectProp(i); dd.appendChild(el);
  });
}

function toggleDD(){
  document.getElementById("propBtn").classList.toggle("open");
  document.getElementById("propDD").classList.toggle("open");
}

document.addEventListener("click",e=>{
  if(!document.getElementById("propWrap").contains(e.target)){
    document.getElementById("propBtn").classList.remove("open");
    document.getElementById("propDD").classList.remove("open");
  }
});

function selectProp(i){
  curProp=i; focusedCard=0;
  document.getElementById("propLabel").textContent=PROPERTIES[i].label;
  document.querySelectorAll(".pd-item").forEach(el=>el.classList.toggle("active",+el.dataset.i===i));
  document.getElementById("propBtn").classList.remove("open");
  document.getElementById("propDD").classList.remove("open");
  buildGrid();
}

function navProp(d){ selectProp((curProp+d+PROPERTIES.length)%PROPERTIES.length); }

function buildGrid(){
  const grid=document.getElementById("imgGrid"), p=PROPERTIES[curProp];
  grid.innerHTML=""; grid.className="image-grid show-"+curEd;
  if(!p.pairs.length){
    grid.innerHTML=`<div style="grid-column:1/-1;padding:60px;text-align:center;font-family:monospace;font-size:.7rem;color:var(--text-muted);">No pairs for this property</div>`;
    return;
  }
  p.pairs.forEach(([kFile,aFile],i)=>{
    const card=document.createElement("div");
    card.className="img-card"+(i===focusedCard?" focused-card":"");
    card.dataset.idx=i;
    card.onclick=()=>{ if(window.innerWidth<=580) switchEd(curEd==="autohdr"?"kamel":"autohdr"); };
    const stack=document.createElement("div"); stack.className="img-stack";
    const imgA=document.createElement("img"); imgA.className="a"; imgA.src=A+aFile; imgA.loading="lazy"; imgA.decoding="async"; stack.appendChild(imgA);
    const imgK=document.createElement("img"); imgK.className="k"; imgK.src=K+kFile; imgK.loading="lazy"; imgK.decoding="async"; stack.appendChild(imgK);
    card.appendChild(stack);
    const ba=document.createElement("div"); ba.className="img-badge a"; ba.textContent="AutoHDR"; card.appendChild(ba);
    const bk=document.createElement("div"); bk.className="img-badge k"; bk.textContent="Kamel"; card.appendChild(bk);
    const num=document.createElement("div"); num.className="img-num"; num.textContent=String(i+1).padStart(2,"0"); card.appendChild(num);
    grid.appendChild(card);
  });
  document.getElementById("gridInfo").textContent=p.label+" — "+p.pairs.length+" pairs";
  updateDots();
}

function switchEd(ed){
  curEd=ed;
  document.querySelectorAll(".tab").forEach(t=>{
    t.classList.remove("active-autohdr","active-kamel");
    if(t.dataset.ed===ed) t.classList.add("active-"+ed);
  });
  document.getElementById("imgGrid").className="image-grid show-"+ed;
  updateDots();
}

function updateDots(){
  const c=document.getElementById("dots"); c.innerHTML="";
  ["autohdr","kamel"].forEach(ed=>{
    const d=document.createElement("div");
    d.className="dot"+(ed===curEd?" on":"");
    d.onclick=()=>switchEd(ed);
    c.appendChild(d);
  });
}

// Navigate to a specific card row by index, scroll it into view
function focusCard(idx){
  const cards=Array.from(document.querySelectorAll(".img-card"));
  if(!cards.length) return;
  const cols=window.innerWidth>580?2:1;
  // Clamp to valid row start (multiples of cols)
  const rowIdx=Math.floor(idx/cols)*cols;
  focusedCard=Math.max(0,Math.min(rowIdx,cards.length-1));
  cards.forEach((c,i)=>c.classList.toggle("focused-card",i===focusedCard));
  cards[focusedCard].scrollIntoView({behavior:"smooth",block:"start"});
}

function fmt(n){ return"$"+n.toLocaleString("en-US",{maximumFractionDigits:0}); }

function updateCalc(){
  const vol=Math.max(1,parseInt(document.getElementById("volInput").value)||5000);
  const r=RATE[billing];
  const km=vol*r.k,am=vol*r.a,ky=km*12,ay=am*12,mM=Math.max(km,am),mY=Math.max(ky,ay),mR=Math.max(r.k,r.a);
  document.getElementById("rK").textContent="$"+r.k.toFixed(2);
  document.getElementById("rA").textContent="$"+r.a.toFixed(2);
  document.getElementById("bRK").style.width=(r.k/mR*100)+"%";
  document.getElementById("bRA").style.width=(r.a/mR*100)+"%";
  document.getElementById("vKM").textContent=fmt(km); document.getElementById("vAM").textContent=fmt(am);
  document.getElementById("vKY").textContent=fmt(ky); document.getElementById("vAY").textContent=fmt(ay);
  document.getElementById("bKM").style.width=(km/mM*100)+"%"; document.getElementById("bAM").style.width=(am/mM*100)+"%";
  document.getElementById("bKY").style.width=(ky/mY*100)+"%"; document.getElementById("bAY").style.width=(ay/mY*100)+"%";
}

function stepVol(d){ const i=document.getElementById("volInput"); i.value=Math.max(1,(parseInt(i.value)||5000)+d); updateCalc(); }
function setBilling(p){ billing=p; document.querySelectorAll(".btab").forEach(t=>t.classList.toggle("active",t.dataset.p===p)); updateCalc(); }
function toggleStats(){ document.getElementById("sBody").classList.toggle("open"); document.getElementById("sChev").classList.toggle("open"); document.getElementById("sBar").classList.toggle("open"); }
function toggleTheme(){ document.body.classList.toggle("light"); }

document.addEventListener("keydown",e=>{
  // Don't hijack when typing in inputs
  if(e.target.tagName==="INPUT") return;
  const cols=window.innerWidth>580?2:1;
  const cards=document.querySelectorAll(".img-card");
  const total=cards.length;
  if(e.key==="ArrowLeft")  { e.preventDefault(); switchEd("autohdr"); return; }
  if(e.key==="ArrowRight") { e.preventDefault(); switchEd("kamel");   return; }
  if(e.key==="ArrowDown")  { e.preventDefault(); focusCard(focusedCard+cols); return; }
  if(e.key==="ArrowUp")    { e.preventDefault(); focusCard(focusedCard-cols); return; }
  if(e.key==="n"||e.key==="N") { navProp(1);  return; }
  if(e.key==="p"||e.key==="P") { navProp(-1); return; }
});

// Trackpad horizontal swipe → switch editor
let acc=0,timer=null;
document.addEventListener("wheel",e=>{
  if(Math.abs(e.deltaX)<Math.abs(e.deltaY)) return;
  e.preventDefault(); acc+=e.deltaX; clearTimeout(timer);
  timer=setTimeout(()=>{ if(Math.abs(acc)>60) switchEd(acc>0?"kamel":"autohdr"); acc=0; },80);
},{passive:false});

buildDD(); selectProp(0); updateCalc();
</script>
